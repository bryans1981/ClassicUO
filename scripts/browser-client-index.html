<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClassicUO Browser Client</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #101216;
      color: #f0f3f7;
      font-family: Segoe UI, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      overscroll-behavior: none;
    }

    #status {
      position: fixed;
      left: 16px;
      bottom: 16px;
      max-width: min(640px, calc(100vw - 32px));
      padding: 10px 12px;
      background: rgba(16, 18, 22, 0.86);
      border: 1px solid rgba(240, 243, 247, 0.18);
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    #log {
      position: fixed;
      left: 16px;
      top: 16px;
      max-width: min(720px, calc(100vw - 32px));
      max-height: min(50vh, calc(100vh - 32px));
      margin: 0;
      padding: 10px 12px;
      overflow: auto;
      background: rgba(12, 14, 18, 0.9);
      border: 1px solid rgba(240, 243, 247, 0.12);
      border-radius: 6px;
      color: #cfd6df;
      font-size: 12px;
      line-height: 1.35;
      white-space: pre-wrap;
      pointer-events: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      outline: none;
    }
  </style>
</head>
<body>
  <canvas id="classicuo-canvas" width="1280" height="720" tabindex="0"></canvas>
  <div id="status">Loading ClassicUO browser runtime...</div>
  <pre id="log"></pre>
  <script type="module">
    import { dotnet } from './_framework/dotnet.js';

    const status = document.getElementById('status');
    const canvas = document.getElementById('classicuo-canvas');
    const log = document.getElementById('log');
    const debugTrace = new URLSearchParams(location.search).has('debug') || localStorage.getItem('classicuo-browser-debug') === '1';
    const assetManifestUrl = './uo-manifest.json';
    const browserLoginUrl = './browser-login.json';
    const assetRoot = '/uo';
    let assetPaths = [];
    let browserLoginJson = '';

    const rewriteBrowserAssetUrl = (requestUrl) => {
      if (requestUrl === assetRoot || requestUrl.startsWith(`${assetRoot}/`)) {
        return `.${requestUrl}`;
      }

      if (requestUrl === '/uo-manifest.json') {
        return './uo-manifest.json';
      }

      return requestUrl;
    };

    const appendLog = (level, args) => {
      const message = args.map((item) => {
        if (item instanceof Error) {
          return item.stack || item.message || String(item);
        }

        if (typeof item === 'object') {
          try {
            return JSON.stringify(item);
          } catch {
            return String(item);
          }
        }

        return String(item);
      }).join(' ');

      log.textContent += `[${level}] ${message}\n`;
      log.scrollTop = log.scrollHeight;
    };

    const bindConsole = (method, level) => {
      const original = console[method].bind(console);
      console[method] = (...args) => {
        const statusLine = args.length > 0 ? String(args[0]) : '';
        if (statusLine.startsWith('BROWSER_STATUS ')) {
          const payload = statusLine.substring('BROWSER_STATUS '.length);
          const separatorIndex = payload.indexOf('|');
          const stage = separatorIndex >= 0 ? payload.substring(0, separatorIndex) : payload;
          const detail = separatorIndex >= 0 ? payload.substring(separatorIndex + 1) : '';
          void reportStatus(stage, detail).catch(() => {});
        }

        if (debugTrace) {
          appendLog(level, args);
        }
        original(...args);
      };
    };

    bindConsole('log', 'log');
    bindConsole('debug', 'debug');
    bindConsole('info', 'info');
    bindConsole('warn', 'warn');
    bindConsole('error', 'error');

    if (!debugTrace) {
      log.style.display = 'none';
    }

    const originalFetch = window.fetch.bind(window);
    window.classicuoPostStatus = (stage, detail) => {
      void originalFetch('/__browser-status', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json; charset=utf-8'
        },
        body: JSON.stringify({
          stage,
          detail,
          url: location.href,
          timestamp: new Date().toISOString()
        })
      }).catch(() => {
        if (debugTrace) {
          console.warn(`status beacon failed: ${stage}`);
        }
      });
    };

    const reportStatus = async (stage, detail = '') => {
      try {
        await originalFetch('/__browser-status', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json; charset=utf-8'
          },
          body: JSON.stringify({
            stage,
            detail,
            url: location.href,
            timestamp: new Date().toISOString()
          })
        });
      } catch (error) {
        if (debugTrace) {
          console.warn(`status beacon failed: ${stage}`, error);
        }
      }
    };

    const browserSockets = new Map();
    let nextBrowserSocketHandle = 1;
    let managedBrowserSocketExports = null;

    const callManagedBrowserSocket = (method, ...args) => {
      const bridge = managedBrowserSocketExports?.ClassicUO?.Network?.Socket?.BrowserWebSocketInterop;
      const callback = bridge?.[method];
      if (typeof callback === 'function') {
        try {
          callback(...args);
        } catch (error) {
          void reportStatus('browser-socket-callback-error', `${method}:${String(error?.stack || error)}`);
          console.error(`browser websocket managed callback failed for ${method}`, error);
        }
      } else {
        void reportStatus('browser-socket-callback-missing', method);
      }
    };

    const browserSocketModule = {
      connect: (handle, url) => {
        const socketHandle = handle || nextBrowserSocketHandle++;
        const socket = new WebSocket(url);
        socket.binaryType = 'arraybuffer';
        let openNotified = false;
        let closedNotified = false;
        let lastReadyState = socket.readyState;
        let rafPollActive = true;

        void reportStatus('browser-socket-state-created', `${socketHandle}:${socket.readyState}:${socket.url}`);
        window.setTimeout(() => {
          void reportStatus('browser-socket-state-delay-250', `${socketHandle}:${socket.readyState}:${socket.bufferedAmount}`);
        }, 250);
        window.setTimeout(() => {
          void reportStatus('browser-socket-state-delay-1000', `${socketHandle}:${socket.readyState}:${socket.bufferedAmount}`);
        }, 1000);
        window.setTimeout(() => {
          void reportStatus('browser-socket-state-delay-3000', `${socketHandle}:${socket.readyState}:${socket.bufferedAmount}`);
        }, 3000);

        browserSockets.set(socketHandle, {
          socket,
          queue: [],
          pendingSends: []
        });

        const flushPendingSends = () => {
          const entry = browserSockets.get(socketHandle);
          if (!entry || entry.socket.readyState !== WebSocket.OPEN || entry.pendingSends.length === 0) {
            return;
          }

          while (entry.pendingSends.length > 0) {
            entry.socket.send(entry.pendingSends.shift());
          }
        };

        const notifyOpen = () => {
          if (openNotified) {
            return;
          }

          openNotified = true;
          void reportStatus('browser-socket-open-event', String(socketHandle));
          callManagedBrowserSocket('OnOpen', socketHandle);
          flushPendingSends();
        };

        const notifyClose = () => {
          if (closedNotified) {
            return;
          }

          closedNotified = true;
          callManagedBrowserSocket('OnClose', socketHandle);
        };

        const openPoll = window.setInterval(() => {
          if (socket.readyState !== lastReadyState) {
            lastReadyState = socket.readyState;
            void reportStatus('browser-socket-readystate', `${socketHandle}:${socket.readyState}`);
          }

          if (socket.readyState === WebSocket.OPEN) {
            window.clearInterval(openPoll);
            notifyOpen();
          } else if (socket.readyState === WebSocket.CLOSED) {
            window.clearInterval(openPoll);
            notifyClose();
          }
        }, 25);

        const rafPoll = () => {
          if (!rafPollActive) {
            return;
          }

          if (socket.readyState !== lastReadyState) {
            lastReadyState = socket.readyState;
            void reportStatus('browser-socket-readystate', `${socketHandle}:${socket.readyState}`);
          }

          if (socket.readyState === WebSocket.OPEN) {
            rafPollActive = false;
            notifyOpen();
            return;
          }

          if (socket.readyState === WebSocket.CLOSED) {
            rafPollActive = false;
            notifyClose();
            return;
          }

          window.requestAnimationFrame(rafPoll);
        };

        window.requestAnimationFrame(rafPoll);

        socket.addEventListener('message', async (event) => {
          const entry = browserSockets.get(socketHandle);
          if (!entry) {
            return;
          }

          try {
            const bytes = event.data instanceof ArrayBuffer
              ? new Uint8Array(event.data)
              : new Uint8Array(await event.data.arrayBuffer());
            entry.queue.push(bytes);
            callManagedBrowserSocket('OnMessage', socketHandle, bytes);
          } catch (error) {
            console.error(`browser websocket message decode failed for ${url}`, error);
          }
        });

        socket.addEventListener('close', (event) => {
          const entry = browserSockets.get(socketHandle);
          if (entry) {
            entry.closed = true;
          }
          window.clearInterval(openPoll);
          rafPollActive = false;
          void reportStatus('browser-socket-close-event', `${socketHandle}:${event.code}:${event.reason || ''}:${event.wasClean ? 'clean' : 'unclean'}`);
          notifyClose();
        });

        socket.addEventListener('error', (error) => {
          console.error(`browser websocket error for ${url}`, error);
          void reportStatus('browser-socket-error-event', `${socketHandle}:${String(error?.message || error || 'browser websocket error')}`);
          callManagedBrowserSocket('OnError', socketHandle, String(error?.message || error || 'browser websocket error'));
        });

        socket.addEventListener('open', () => {
          window.clearInterval(openPoll);
          rafPollActive = false;
          notifyOpen();
        });

        return socketHandle;
      },
      send: (handle, bytes, count) => {
        const entry = browserSockets.get(handle);
        if (!entry) {
          throw new Error(`browser websocket handle ${handle} not found`);
        }

        const payload = bytes instanceof Uint8Array ? bytes.subarray(0, count) : new Uint8Array(bytes).subarray(0, count);
        const copy = payload.slice();

        if (entry.socket.readyState === WebSocket.OPEN) {
          entry.socket.send(copy);
          return;
        }

        if (entry.socket.readyState === WebSocket.CONNECTING) {
          entry.pendingSends.push(copy);
          void reportStatus('browser-socket-send-queued', `${handle}:${copy.length}`);
          return;
        }

        throw new Error(`browser websocket is not open for handle ${handle}`);
      },
      receive: (handle) => {
        const entry = browserSockets.get(handle);
        if (!entry || entry.queue.length === 0) {
          return null;
        }

        return entry.queue.shift();
      },
      close: (handle) => {
        const entry = browserSockets.get(handle);
        if (!entry) {
          return;
        }

        try {
          entry.socket.close();
        } catch (error) {
          console.warn(`browser websocket close failed for handle ${handle}`, error);
        } finally {
          browserSockets.delete(handle);
        }
      }
    };

    window.addEventListener('error', (event) => {
      const detail = event.error instanceof Error
        ? (event.error.stack || event.error.message || String(event.error))
        : `${event.message || 'window error'} @ ${event.filename || 'unknown'}:${event.lineno || 0}:${event.colno || 0}`;
      void reportStatus('page-error', detail);
      if (debugTrace) {
        appendLog('error', [detail]);
      }
    });

    window.addEventListener('unhandledrejection', (event) => {
      const reason = event.reason instanceof Error
        ? (event.reason.stack || event.reason.message || String(event.reason))
        : String(event.reason);
      void reportStatus('page-unhandledrejection', reason);
      if (debugTrace) {
        appendLog('error', [reason]);
      }
    });

    reportStatus('page-init');
    window.fetch = async (input, init) => {
      const requestUrl = typeof input === 'string' ? input : input?.url || String(input);
      const rewrittenUrl = rewriteBrowserAssetUrl(requestUrl);
      const shouldTrace = debugTrace && (requestUrl.includes('/_framework/') || requestUrl.includes('/uo'));

      if (shouldTrace) {
        console.info(`fetch start: ${rewrittenUrl}`);
      }

      try {
        const fetchInput = typeof input === 'string' ? rewrittenUrl : new Request(rewrittenUrl, input);
        const response = await originalFetch(fetchInput, init);

        if (shouldTrace && !response.ok) {
          console.error(`fetch failed: ${rewrittenUrl} -> ${response.status} ${response.statusText}`);
        }

        if (shouldTrace) {
          const originalArrayBuffer = response.arrayBuffer.bind(response);
          const originalText = response.text.bind(response);
          const originalJson = response.json.bind(response);
          response.__classicuoRequestUrl = rewrittenUrl;

          response.arrayBuffer = async () => {
            console.info(`fetch body read: ${rewrittenUrl} -> arrayBuffer`);
            try {
              return await originalArrayBuffer();
            } catch (error) {
              console.error(`fetch body error: ${rewrittenUrl} -> arrayBuffer`, error);
              throw error;
            }
          };

          response.text = async () => {
            console.info(`fetch body read: ${rewrittenUrl} -> text`);
            try {
              return await originalText();
            } catch (error) {
              console.error(`fetch body error: ${rewrittenUrl} -> text`, error);
              throw error;
            }
          };

          response.json = async () => {
            console.info(`fetch body read: ${rewrittenUrl} -> json`);
            try {
              return await originalJson();
            } catch (error) {
              console.error(`fetch body error: ${rewrittenUrl} -> json`, error);
              throw error;
            }
          };
        }

        return response;
      } catch (error) {
        if (shouldTrace) {
          console.error(`fetch exception: ${requestUrl}`, error);
        }

        throw error;
      }
    };

    const originalInstantiateStreaming = WebAssembly.instantiateStreaming.bind(WebAssembly);
    WebAssembly.instantiateStreaming = async (source, imports) => {
      const requestUrl = source?.__classicuoRequestUrl || source?.url || '';
      if (debugTrace && requestUrl.includes('/_framework/')) {
        console.info(`wasm instantiateStreaming: ${requestUrl}`);
      }

      try {
        return await originalInstantiateStreaming(source, imports);
      } catch (error) {
        if (debugTrace && requestUrl.includes('/_framework/')) {
          console.error(`wasm instantiateStreaming failed: ${requestUrl}`, error);
        }

        throw error;
      }
    };

    const originalCompileStreaming = WebAssembly.compileStreaming.bind(WebAssembly);
    WebAssembly.compileStreaming = async (source) => {
      const requestUrl = source?.__classicuoRequestUrl || source?.url || '';
      if (debugTrace && requestUrl.includes('/_framework/')) {
        console.info(`wasm compileStreaming: ${requestUrl}`);
      }

      try {
        return await originalCompileStreaming(source);
      } catch (error) {
        if (debugTrace && requestUrl.includes('/_framework/')) {
          console.error(`wasm compileStreaming failed: ${requestUrl}`, error);
        }

        throw error;
      }
    };

    const originalInstantiate = WebAssembly.instantiate.bind(WebAssembly);
    WebAssembly.instantiate = async (source, imports) => {
      const requestUrl = source?.__classicuoRequestUrl || source?.url || '';
      if (debugTrace && requestUrl.includes('/_framework/')) {
        console.info(`wasm instantiate: ${requestUrl}`);
      }

      try {
        return await originalInstantiate(source, imports);
      } catch (error) {
        if (debugTrace && requestUrl.includes('/_framework/')) {
          console.error(`wasm instantiate failed: ${requestUrl}`, error);
        }

        throw error;
      }
    };

    const originalCompile = WebAssembly.compile.bind(WebAssembly);
    WebAssembly.compile = async (bufferSource) => {
      if (debugTrace) {
        console.info('wasm compile invoked');
      }

      try {
        return await originalCompile(bufferSource);
      } catch (error) {
        if (debugTrace) {
          console.error('wasm compile failed', error);
        }
        throw error;
      }
    };

    const originalOpen = XMLHttpRequest.prototype.open;
    const originalSend = XMLHttpRequest.prototype.send;
    XMLHttpRequest.prototype.open = function (method, url, ...rest) {
      const requestUrl = typeof url === 'string' ? url : String(url);
      const rewrittenUrl = rewriteBrowserAssetUrl(requestUrl);
      this.__classicuoRequestUrl = rewrittenUrl;
      return originalOpen.call(this, method, rewrittenUrl, ...rest);
    };

    XMLHttpRequest.prototype.send = function (...args) {
      const requestUrl = this.__classicuoRequestUrl || '';
      const shouldTrace = requestUrl.includes('/_framework/') || requestUrl.includes('/uo');

      if (shouldTrace) {
        console.info(`xhr start: ${requestUrl}`);
        this.addEventListener('load', () => {
          console.info(`xhr load: ${requestUrl} -> ${this.status}`);
        });
        this.addEventListener('error', () => {
          console.error(`xhr error: ${requestUrl} -> ${this.status}`);
        });
        this.addEventListener('abort', () => {
          console.error(`xhr abort: ${requestUrl} -> ${this.status}`);
        });
      }

      return originalSend.apply(this, args);
    };

    window.addEventListener('error', (event) => {
      if (debugTrace) {
        appendLog('window.error', [event.error || event.message || 'Unknown error']);
      }
    });

    window.addEventListener('unhandledrejection', (event) => {
      if (debugTrace) {
        appendLog('unhandledrejection', [event.reason || 'Unknown rejection']);
      }
    });

    const resizeCanvas = () => {
      canvas.width = Math.max(1, window.innerWidth);
      canvas.height = Math.max(1, window.innerHeight);
    };

    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('pointerdown', () => canvas.focus());
    window.addEventListener('mousedown', () => canvas.focus());
    window.addEventListener('touchstart', () => canvas.focus(), { passive: true });
    window.addEventListener('keydown', () => canvas.focus());
    canvas.addEventListener('pointerdown', () => canvas.focus());
    canvas.addEventListener('mousedown', () => canvas.focus());
    canvas.addEventListener('touchstart', () => canvas.focus(), { passive: true });
    canvas.addEventListener('wheel', () => canvas.focus(), { passive: true });
    canvas.addEventListener('contextmenu', (event) => event.preventDefault());
    canvas.addEventListener('dragstart', (event) => event.preventDefault());
    resizeCanvas();
    canvas.focus();

    const moduleConfig = {
      canvas,
      noAudioDecoding: true,
      preRun: [
        (module) => {
          const fsApi = module?.FS ?? self.FS;

          if (!fsApi) {
            if (debugTrace) {
              console.warn('ClassicUO browser preRun: browser FS is not available yet.');
            }
            return;
          }

          void reportStatus('preRun-start', String(assetPaths.length));
          fsApi.mkdirTree(assetRoot);

          if (browserLoginJson) {
            try {
              fsApi.writeFile(`${assetRoot}/browser-login.json`, browserLoginJson);
              void reportStatus('preRun-login-write', 'done');
              if (debugTrace) {
                console.info('ClassicUO browser preRun: wrote browser-login.json override.');
              }
            } catch (error) {
              console.error('ClassicUO browser preRun: failed to write browser-login.json override', error);
              throw error;
            }
          }

          if (debugTrace) {
            console.info(`ClassicUO browser preRun: mounting ${assetPaths.length} assets into ${assetRoot}`);
          }

          for (let index = 0; index < assetPaths.length; index++) {
            const path = assetPaths[index];
            const directory = path.slice(0, path.lastIndexOf('/'));
            const fileName = path.slice(path.lastIndexOf('/') + 1);

            if (directory && directory !== path) {
              fsApi.mkdirTree(directory);
            }

            try {
              if (debugTrace && (index < 5 || index % 500 === 0)) {
                console.info(`ClassicUO browser preRun: preloading ${index + 1}/${assetPaths.length} ${path}`);
              }
              if (index % 100 === 0) {
                void reportStatus('preRun-progress', `${index + 1}/${assetPaths.length}`);
              }
              fsApi.createPreloadedFile(directory || assetRoot, fileName, path, true, false);
            } catch (error) {
              console.error(`ClassicUO browser preRun: failed to preload ${path}`, error);
              throw error;
            }
          }

          void reportStatus('preRun-complete', String(assetPaths.length));
        },
        (module) => {
            if (debugTrace) {
              console.info('ClassicUO browser preRun: createContext', typeof module?.createContext);
            }
            if (module?.createContext) {
              module.createContext(canvas, true, true, {
                alpha: false,
              antialias: false,
              majorVersion: 2
            });
          }
        }
      ]
    };

    try {
      const manifestResponse = await fetch(assetManifestUrl, { cache: 'no-store' });
      if (manifestResponse.ok) {
        const manifest = await manifestResponse.json();
        assetPaths = Array.isArray(manifest?.files) ? manifest.files : [];

        reportStatus('manifest-loaded', String(assetPaths.length));
        status.textContent = `Queued ${assetPaths.length} browser assets from ${manifest.version || 'unknown version'}. Starting runtime...`;
      } else {
        reportStatus('manifest-missing');
        status.textContent = 'No browser asset manifest found. Starting runtime without staged UO assets.';
      }

      const browserLoginResponse = await fetch(browserLoginUrl, { cache: 'no-store' });
      if (browserLoginResponse.ok) {
        browserLoginJson = await browserLoginResponse.text();
        reportStatus('browser-login-loaded', browserLoginJson ? 'present' : 'empty');
        if (debugTrace) {
          console.info('Loaded browser-login.json override.');
        }
      } else {
        reportStatus('browser-login-missing');
      }

      status.textContent = 'Starting ClassicUO browser runtime...';
      reportStatus('runtime-create');
      const runtime = await dotnet
        .withConfig({
          debugLevel: 0
        })
        .withResourceLoader((type, name, defaultUri, integrity, behavior) => {
          if (debugTrace) {
            console.info(`boot resource request: type=${type} behavior=${behavior} name=${name} uri=${defaultUri}`);
          }

          if (behavior === 'symbols') {
            if (debugTrace) {
              console.info(`Skipping debug symbol asset: ${name}`);
            }
            return Promise.resolve(new Response('', {
              status: 200,
              headers: {
                'Content-Type': 'text/plain; charset=utf-8'
              }
            }));
          }

          return undefined;
        })
        .withDiagnosticTracing(debugTrace)
        .withModuleConfig(moduleConfig)
        .withDebugging(0)
        .withApplicationArgumentsFromQuery()
        .create();

      managedBrowserSocketExports = await runtime.getAssemblyExports('cuo');
      reportStatus('browser-socket-exports', Object.keys(managedBrowserSocketExports || {}).join(','));
      if (managedBrowserSocketExports?.ClassicUO) {
        reportStatus('browser-socket-classicuo', Object.keys(managedBrowserSocketExports.ClassicUO || {}).join(','));
        if (managedBrowserSocketExports.ClassicUO?.Network) {
          reportStatus('browser-socket-network', Object.keys(managedBrowserSocketExports.ClassicUO.Network || {}).join(','));
          if (managedBrowserSocketExports.ClassicUO.Network?.Socket) {
            reportStatus('browser-socket-socket', Object.keys(managedBrowserSocketExports.ClassicUO.Network.Socket || {}).join(','));
            if (managedBrowserSocketExports.ClassicUO.Network.Socket?.BrowserWebSocketInterop) {
              reportStatus('browser-socket-interop', Object.keys(managedBrowserSocketExports.ClassicUO.Network.Socket.BrowserWebSocketInterop || {}).join(','));
            }
          }
        }
      }
      runtime.setModuleImports('classicuo.browser-socket', browserSocketModule);

      status.hidden = true;
      reportStatus('runtime-runmain');
      await runtime.runMainAndExit();
      status.hidden = false;
      reportStatus('runtime-exited');
      status.textContent = 'ClassicUO browser runtime exited.';
    } catch (error) {
      status.hidden = false;
      reportStatus('runtime-failed', String(error?.stack || error));
      console.error(error);
      status.textContent = `ClassicUO browser runtime failed:\n${error?.stack || error}`;
    }
  </script>
</body>
</html>
