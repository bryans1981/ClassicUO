<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClassicUO Browser Client</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #101216;
      color: #f0f3f7;
      font-family: Segoe UI, sans-serif;
    }

    #status {
      position: fixed;
      left: 16px;
      bottom: 16px;
      max-width: min(640px, calc(100vw - 32px));
      padding: 10px 12px;
      background: rgba(16, 18, 22, 0.86);
      border: 1px solid rgba(240, 243, 247, 0.18);
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="status">Loading ClassicUO browser runtime...</div>
  <script type="module">
    import { dotnet } from './_framework/dotnet.js';

    const status = document.getElementById('status');

    try {
      status.textContent = 'Starting ClassicUO browser runtime...';
      await dotnet
        .withApplicationArgumentsFromQuery()
        .run();
      status.textContent = 'ClassicUO browser runtime exited.';
    } catch (error) {
      console.error(error);
      status.textContent = `ClassicUO browser runtime failed:\n${error?.stack || error}`;
    }
  </script>
</body>
</html>
